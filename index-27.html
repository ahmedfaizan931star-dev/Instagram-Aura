<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              ig: {
                primary: '#6366f1', // Indigo-500
                primaryHover: '#4f46e5',
                secondary: '#1e1e24', // Slightly purple-tinted dark
                bg: '#050508', // Very dark indigo-black
                card: '#0f0f13', // Slightly lighter
                text: '#FAFAFA',
                muted: '#9ca3af',
                border: '#27272a',
                separator: '#27272a',
                like: '#f43f5e'
              },
              aura: {
                start: '#4f46e5', // Indigo
                mid: '#a855f7',   // Purple
                end: '#ec4899'    // Pink
              }
            },
            fontFamily: {
              sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'Helvetica', 'Arial', 'sans-serif'],
              serif: ['Playfair Display', 'serif']
            },
            animation: {
              'blob': 'blob 10s infinite',
              'fade-in': 'fadeIn 0.5s ease-out forwards',
            },
            keyframes: {
              blob: {
                '0%': { transform: 'translate(0px, 0px) scale(1)' },
                '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                '100%': { transform: 'translate(0px, 0px) scale(1)' },
              },
              fadeIn: {
                '0%': { opacity: '0', transform: 'translateY(10px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              }
            }
          }
        }
      }
    </script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Playfair+Display:ital,wght@1,600&display=swap');

      body {
        background-color: #050508;
        color: #FAFAFA;
        /* Subtle ambient background */
        background-image: 
          radial-gradient(circle at 50% 0%, rgba(79, 70, 229, 0.15), transparent 60%),
          radial-gradient(circle at 80% 10%, rgba(236, 72, 153, 0.1), transparent 50%);
        background-attachment: fixed;
      }

      /* Hide scrollbar for stories */
      .no-scrollbar::-webkit-scrollbar {
          display: none;
      }
      .no-scrollbar {
          -ms-overflow-style: none;
          scrollbar-width: none;
      }
      
      /* Smooth selection */
      ::selection {
        background: rgba(168, 85, 247, 0.3);
        color: white;
      }
    </style>
</head>
<body>
    <div id="root"></div>
</body>
</html>
